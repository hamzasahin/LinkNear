<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Paper background with hairline rule -->
  <circle cx="50" cy="50" r="48" fill="#f8f6f3" stroke="#3d3733" stroke-width="3"/>
  <!-- Concentric radar rings -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#c2beba" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="18" fill="none" stroke="#c2beba" stroke-width="1.5"/>
  <!-- Crosshair -->
  <line x1="50" y1="6" x2="50" y2="94" stroke="#c2beba" stroke-width="1"/>
  <line x1="6" y1="50" x2="94" y2="50" stroke="#c2beba" stroke-width="1"/>
  <!-- Coral dots — three nearby points -->
  <circle cx="38" cy="34" r="4" fill="#e66253"/>
  <circle cx="66" cy="62" r="4" fill="#e66253"/>
  <circle cx="32" cy="66" r="3" fill="#e66253"/>
  <!-- Center mark -->
  <circle cx="50" cy="50" r="2.5" fill="#3d3733"/>
</svg>
